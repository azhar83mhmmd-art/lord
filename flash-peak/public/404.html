<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Halaman Tidak Ditemukan | LORD</title>
<link rel="icon" href="/assets/favicon.ico">
<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/animation.css">
<link rel="stylesheet" href="/css/responsive.css">
<link rel="stylesheet" href="/css/darkmode.css">
</head>
<body>

<div class="field-bg"></div>
<div class="particles"></div>

<main style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;">
  <div class="container" style="max-width:480px;">
    <div style="font-family:var(--font-display);font-weight:900;font-size:clamp(70px,14vw,120px);line-height:1;background:var(--grad-blue-green);-webkit-background-clip:text;background-clip:text;color:transparent;">404</div>
    <h1 class="section-title" style="margin-top:10px;">Out of Bounds</h1>
    <p class="section-sub" style="margin:14px auto 32px;">Halaman yang kamu cari tidak ada di lapangan ini. Mungkin sudah dipindah atau salah ketik URL.</p>
    <a href="/index.html" class="btn btn-primary btn-lg">
      Kembali ke Dashboard
    </a>
  </div>
</main>

<script>
(function() {
  const field = document.querySelector('.particles');
  if (!field) return;
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1.5;
    p.style.width = `${size}px`;
    p.style.height = `${size}px`;
    p.style.left = `${Math.random() * 100}%`;
    p.style.bottom = '-10px';
    p.style.animationDuration = `${Math.random() * 14 + 10}s`;
    p.style.animationDelay = `${Math.random() * 10}s`;
    field.appendChild(p);
  }
})();
</script>
</body>
</html>
