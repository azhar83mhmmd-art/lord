<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — LORD</title>
<link rel="icon" href="/assets/favicon.ico">
<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/style.css">

<link rel="stylesheet" href="/css/animation.css">
<link rel="stylesheet" href="/css/responsive.css">

</head>
<body>

<div class="field-bg"></div>
<div class="particles"></div>

<header class="site-header">
  <div class="container">
    <a href="/index.html" class="brand">
      <img src="/assets/logo.svg" alt="" class="logo-mark">
      <span>LO<span class="accent">RD</span></span>
    </a>
    <nav class="main-nav" id="site-nav"></nav>
    <div class="header-actions">
      <a href="/register.html" class="btn btn-primary">Join Squad</a>
      <button class="nav-toggle" id="nav-toggle"></button>

  </div>

<main>
  <section class="block" style="padding-bottom:0;">
    <div class="container">
      <span class="eyebrow">Season 4 Ranking</span>
      <h1 class="section-title" style="font-size:clamp(26px,4vw,38px);">Leaderboard</h1>

    </div>
  </section>

  <section class="block">
    <div class="container" style="max-width:820px;">
      <div id="leaderboard-list">
        <div class="card" style="padding:40px;text-align:center;color:var(--text-muted);">Memuat leaderboard...</div>

    </div>
  </section>

<footer class="site-footer" id="site-footer"></footer>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/icons.js"></script>
<script src="/js/utils.js"></script>

initLeaderboardPage();

subscribeDashboardRealtime({
  onMembers: initLeaderboardPage
});
</script>
