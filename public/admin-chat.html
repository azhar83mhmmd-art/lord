<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox Chat — Admin LORD</title>
<link rel="icon" href="/assets/favicon.ico">
<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/animation.css">
<link rel="stylesheet" href="/css/responsive.css">
<link rel="stylesheet" href="/css/darkmode.css">
<link rel="stylesheet" href="/css/chat.css">
</head>
<body>

<div class="field-bg"></div>
<div class="particles"></div>

<header class="site-header">
  <div class="container">
    <a href="/index.html" class="brand">
      <img src="/assets/logo.svg" alt="" class="logo-mark">
      <span>LO<span class="accent">RD</span></span>
    </a>
    <nav class="main-nav" id="site-nav"></nav>
    <div class="header-actions">
      <button class="nav-toggle" id="nav-toggle"></button>
    </div>
  </div>
</header>

<main>
  <section class="block" style="padding-bottom:0;">
    <div class="container">
      <span class="eyebrow">Restricted Area</span>
      <h1 class="section-title" style="font-size:clamp(24px,4vw,34px);">Inbox Chat</h1>
      <p class="section-sub">Semua percakapan pengunjung dengan Admin Komunitas Lord. Klik satu untuk membaca dan membalas.</p>
    </div>
  </section>

  <section class="block">
    <div class="container">
      <div class="inbox-shell">
        <div class="inbox-sidebar">
          <div class="inbox-sidebar-head">Percakapan</div>
          <div id="inbox-list">
            <div class="inbox-thread-empty">Memuat...</div>
          </div>
        </div>

        <div class="inbox-thread" id="inbox-thread">
          <div class="inbox-thread-empty">Pilih percakapan di sebelah kiri untuk mulai membalas.</div>
        </div>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer" id="site-footer"></footer>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/icons.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/animation.js"></script>
<script src="/js/admin-chat.js"></script>
<script>
initApp('/admin-chat.html');
initAdminChat();
</script>
</body>
</html>
